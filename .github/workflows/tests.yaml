name: Tests

on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        go: [1.21.x, 1.22.x]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: ikalnytskyi/action-setup-postgres@v4
        id: postgres

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start MongoDB container
        run: |
          docker run -d --name mongodb \
            -p 27017:27017 \
            -e MONGO_INITDB_ROOT_USERNAME=minhareceita \
            -e MONGO_INITDB_ROOT_PASSWORD=minhareceita \
            -e MONGO_INITDB_DATABASE=minhareceita \
            mongo:6
        shell: bash

      - name: Wait for MongoDB to be ready
        run: |
          for i in {1..10}; do
            if docker exec mongodb mongosh -u minhareceita -p minhareceita --authenticationDatabase minhareceita --eval "db.runCommand({ ping: 1 })"; then
              echo "MongoDB is ready!"
              exit 0
            fi
            echo "Waiting for MongoDB..."
            sleep 3
          done
          echo "MongoDB failed to start"
          exit 1
        shell: bash

      - name: Run tests
       
      - uses: actions/setup-go@v3
        with:
          go-version: ${{ matrix.go }}

      - run: go test ./...
        if: matrix.os == 'windows-latest'
        env:
          TEST_POSTGRES_URL: ${{ steps.postgres.outputs.connection-uri }}
          TEST_MONGODB_URL: mongodb://minhareceita:minhareceita@localhost:27017/minhareceita?authSource=admin

      - run: go test --race ./...
        if: matrix.os == 'ubuntu-latest'
        env:
          TEST_POSTGRES_URL: ${{ steps.postgres.outputs.connection-uri }}
          TEST_MONGODB_URL: mongodb://minhareceita:minhareceita@localhost:27017/minhareceita?authSource=admin
