name: Tests

on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        go: [1.21.x, 1.22.x]

    runs-on: ${{ matrix.os }}

    services:
      mongo:
        image: mongo:latest
        env:
          MONGO_INITDB_ROOT_USERNAME: minhareceita
          MONGO_INITDB_ROOT_PASSWORD: minhareceita
          MONGO_INITDB_DATABASE: minhareceita
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --username minhareceita --password minhareceita --authenticationDatabase minhareceita --eval 'db.runCommand(\"ping\")'" 
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: ikalnytskyi/action-setup-postgres@v4
        id: postgres

      - uses: actions/setup-go@v3
        with:
          go-version: ${{ matrix.go }}

      - run: go test ./...
        if: matrix.os == 'windows-latest'
        env:
          TEST_POSTGRES_URL: ${{ steps.postgres.outputs.connection-uri }}
          TEST_MONGODB_URL: mongodb://minhareceita:minhareceita@localhost:27017/minhareceita?authSource=admin

      - run: go test --race ./...
        if: matrix.os == 'ubuntu-latest'
        env:
          TEST_POSTGRES_URL: ${{ steps.postgres.outputs.connection-uri }}
          TEST_MONGODB_URL: mongodb://minhareceita:minhareceita@localhost:27017/minhareceita?authSource=admin
