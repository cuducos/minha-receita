name: Tests

on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        go: [1.21.x, 1.22.x]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: ikalnytskyi/action-setup-postgres@v4
        id: postgres

      - name: Iniciar MongoDB no Linux
        if: runner.os == 'Linux'
        run: |
          docker run -d --name mongodb -p 27017:27017 \
            -e MONGO_INITDB_ROOT_USERNAME=minhareceita \
            -e MONGO_INITDB_ROOT_PASSWORD=minhareceita \
            -e MONGO_INITDB_DATABASE=minhareceita \
            --health-cmd "mongosh -u minhareceita -p minhareceita --authenticationDatabase admin --eval 'db.runCommand(\"ping\")'" \
            --health-interval 10s --health-timeout 5s --health-retries 5 \
            mongo:8


      - name: Iniciar MongoDB no Windows
        if: runner.os == 'Windows'
        run: |
          Start-Process -NoNewWindow -FilePath "docker" -ArgumentList "run -d --name mongodb -p 27017:27017 -e MONGO_INITDB_ROOT_USERNAME=minhareceita -e MONGO_INITDB_ROOT_PASSWORD=minhareceita -e MONGO_INITDB_DATABASE=minhareceita mongo:8"


      - uses: actions/setup-go@v3
        with:
          go-version: ${{ matrix.go }}

      - run: go test ./...
        if: matrix.os == 'windows-latest'
        env:
          TEST_POSTGRES_URL: ${{ steps.postgres.outputs.connection-uri }}
          TEST_MONGODB_URL: mongodb://minhareceita:minhareceita@localhost:27017/minhareceita?authSource=admin

      - run: go test --race ./...
        if: matrix.os == 'ubuntu-latest'
        env:
          TEST_POSTGRES_URL: ${{ steps.postgres.outputs.connection-uri }}
          TEST_MONGODB_URL: mongodb://minhareceita:minhareceita@localhost:27017/minhareceita?authSource=admin
